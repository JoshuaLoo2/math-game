<script>
var transientEffectPools_ = {};

function prefersReducedMotion_() {
    try {
        return !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches);
    } catch (e) {
        return false;
    }
}

function requestSciFiHaptic_(outcome) {
    if (prefersReducedMotion_()) return;
    if (!navigator || typeof navigator.vibrate !== 'function') return;
    try {
        navigator.vibrate(outcome === 'fail' ? [42, 20, 54, 18, 24] : [16, 12, 28]);
    } catch (e) {}
}

function cleanupEffectNode_(node, fallbackMs) {
    if (!node) return;
    var cleaned = false;
    function cleanup() {
        if (cleaned) return;
        cleaned = true;
        if (node.__effectPoolKey) {
            releaseTransientEffectNode_(node);
            return;
        }
        if (node.parentNode) node.parentNode.removeChild(node);
    }
    node.__effectCleanupHandler = cleanup;
    node.addEventListener('animationend', cleanup, { once: true });
    if (fallbackMs) node.__effectCleanupTimer = setTimeout(cleanup, fallbackMs);
}

function getEffectDensityTier_() {
    if (!document || !document.body) return 'full';
    return document.body.getAttribute('data-scene-performance') || 'full';
}

function canRunTransientEffects_() {
    return !(document && document.hidden);
}

function getTransientEffectPool_(poolKey) {
    if (!transientEffectPools_[poolKey]) transientEffectPools_[poolKey] = [];
    return transientEffectPools_[poolKey];
}

function resetTransientEffectNode_(node, className) {
    if (!node) return;
    if (node.__effectCleanupHandler) {
        node.removeEventListener('animationend', node.__effectCleanupHandler);
        node.__effectCleanupHandler = null;
    }
    if (node.__effectCleanupTimer) {
        clearTimeout(node.__effectCleanupTimer);
        node.__effectCleanupTimer = 0;
    }
    node.hidden = false;
    node.className = className || '';
    node.removeAttribute('style');
}

function acquireTransientEffectNode_(poolKey, tagName, className) {
    var pool = getTransientEffectPool_(poolKey);
    var node = pool.length ? pool.pop() : document.createElement(tagName || 'div');
    resetTransientEffectNode_(node, className);
    node.__effectPoolKey = poolKey;
    return node;
}

function releaseTransientEffectNode_(node) {
    if (!node) return;
    resetTransientEffectNode_(node, '');
    if (node.parentNode) node.parentNode.removeChild(node);
    if (node.__effectPoolKey) getTransientEffectPool_(node.__effectPoolKey).push(node);
}

function acquireSparkleBurst_(dotCount) {
    var container = acquireTransientEffectNode_('sparkleBurst', 'div', 'sparkle-burst');
    while (container.childNodes.length < dotCount) {
        var dot = document.createElement('div');
        dot.className = 'sparkle-dot';
        container.appendChild(dot);
    }
    Array.prototype.forEach.call(container.childNodes, function(dot, index) {
        dot.hidden = index >= dotCount;
    });
    return container;
}

function setQuestionCardFeedbackVars_(card, outcome) {
    if (!card) return;
    if (outcome === 'fail') {
        var x1 = (7 + Math.random() * 7) * (Math.random() > 0.5 ? 1 : -1);
        var y1 = (-1 + Math.random() * 4) * (Math.random() > 0.5 ? 1 : -1);
        var tilt1 = (0.65 + Math.random() * 0.65) * (x1 > 0 ? 1 : -1);
        card.style.setProperty('--impact-x1', x1 + 'px');
        card.style.setProperty('--impact-y1', y1 + 'px');
        card.style.setProperty('--impact-tilt1', tilt1 + 'deg');
        card.style.setProperty('--impact-x2', (-x1 * 0.82) + 'px');
        card.style.setProperty('--impact-y2', (-y1 * 0.36) + 'px');
        card.style.setProperty('--impact-tilt2', (-tilt1 * 0.78) + 'deg');
        card.style.setProperty('--impact-x3', (x1 * 0.58) + 'px');
        card.style.setProperty('--impact-y3', (y1 * 0.28) + 'px');
        card.style.setProperty('--impact-tilt3', (tilt1 * 0.52) + 'deg');
        card.style.setProperty('--impact-x4', (-x1 * 0.34) + 'px');
        card.style.setProperty('--impact-y4', (-y1 * 0.12) + 'px');
        card.style.setProperty('--impact-tilt4', (-tilt1 * 0.26) + 'deg');
        return;
    }
    card.style.setProperty('--success-rise', (7 + Math.random() * 5) + 'px');
    card.style.setProperty('--success-rebound', (2 + Math.random() * 2) + 'px');
    card.style.setProperty('--success-scale-peak', (1.018 + Math.random() * 0.012).toFixed(3));
    card.style.setProperty('--success-scale-settle', (1.004 + Math.random() * 0.006).toFixed(3));
}

function spawnQuestionCardFeedbackFlash_(card, outcome) {
    if (!card) return;
    Array.prototype.forEach.call(card.querySelectorAll('.question-card-feedback-flash'), function(node) {
        if (node.__effectPoolKey) releaseTransientEffectNode_(node);
        else node.remove();
    });
    card.classList.add('question-card-feedback-host');
    var flash = acquireTransientEffectNode_(
        outcome === 'fail' ? 'questionCardFlashWrong' : 'questionCardFlashCorrect',
        'div',
        'question-card-feedback-flash ' + (outcome === 'fail' ? 'is-wrong' : 'is-correct')
    );
    card.appendChild(flash);
    cleanupEffectNode_(flash, outcome === 'fail' ? 560 : 720);
}

function spawnQuestionCardFeedbackDecor_(card, outcome) {
    if (!card) return;
    Array.prototype.forEach.call(card.querySelectorAll('.question-card-feedback-ornament'), function(node) {
        if (node.__effectPoolKey) releaseTransientEffectNode_(node);
        else node.remove();
    });
    card.classList.add('question-card-feedback-host');
    if (outcome === 'fail') {
        var scanline = acquireTransientEffectNode_('questionCardScanline', 'div', 'question-card-feedback-ornament is-scanline');
        card.appendChild(scanline);
        cleanupEffectNode_(scanline, 520);
        return;
    }
    for (var i = 0; i < 2; i++) {
        (function(delayMs) {
            var ring = acquireTransientEffectNode_('questionCardEnergyRing', 'div', 'question-card-feedback-ornament is-energy-ring');
            ring.style.animationDelay = delayMs + 'ms';
            card.appendChild(ring);
            cleanupEffectNode_(ring, 860 + delayMs);
        })(i * 70);
    }
}

function triggerSciFiAnswerFeedback_(cardId, stateClass) {
    var card = document.getElementById(cardId || '');
    if (!card || !stateClass) return;
    var outcome = stateClass === 'question-card-fail' ? 'fail' : 'success';
    setQuestionCardFeedbackVars_(card, outcome);
    spawnQuestionCardFeedbackFlash_(card, outcome);
    spawnQuestionCardFeedbackDecor_(card, outcome);
    requestSciFiHaptic_(outcome);
    if (typeof triggerSceneTransition_ === 'function') triggerSceneTransition_(outcome === 'fail' ? 'fail' : 'success');
    card.classList.remove('question-card-success', 'question-card-fail');
    if (typeof restartAnimationClass_ === 'function') restartAnimationClass_(card, stateClass);
    else {
        void card.offsetWidth;
        card.classList.add(stateClass);
    }
    setTimeout(function() {
        if (!card) return;
        card.classList.remove(stateClass);
    }, outcome === 'fail' ? 620 : 720);
}

function launchConfetti(customColors) {
    var colors = customColors || (typeof getActiveThemeParticlePalette_ === 'function' ? getActiveThemeParticlePalette_() : null) || getEquippedEffectColors();
    if (!colors) return;
    if (!canRunTransientEffects_()) return;
    var density = getEffectDensityTier_();
    if (density === 'calm') return;
    var pieceCount = density === 'lite' ? 28 : 50;
    var frag = document.createDocumentFragment();
    for (var i = 0; i < pieceCount; i++) {
        var piece = acquireTransientEffectNode_('confettiPiece', 'div', 'confetti-piece');
        piece.style.left = Math.random() * 100 + 'vw';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.setProperty('--cfd', (2 + Math.random() * 2) + 's');
        piece.style.setProperty('--cfr', (360 + Math.random() * 720) + 'deg');
        piece.style.setProperty('--cfrx', (Math.random() * 360) + 'deg');
        piece.style.animationDelay = (Math.random() * 0.6) + 's';
        piece.style.width = (6 + Math.random() * 6) + 'px';
        piece.style.height = (8 + Math.random() * 10) + 'px';
        frag.appendChild(piece);
        cleanupEffectNode_(piece, 4500);
    }
    document.body.appendChild(frag);
}

function launchMiniConfettiBurst(anchorId, customColors) {
    var anchor = document.getElementById(anchorId);
    var colors = customColors || (typeof getActiveThemeParticlePalette_ === 'function' ? getActiveThemeParticlePalette_() : null) || getEquippedEffectColors() || ['#10b981', '#34d399', '#fbbf24', '#60a5fa'];
    if (!anchor || !colors || !colors.length) return;
    if (!canRunTransientEffects_()) return;
    var density = getEffectDensityTier_();
    if (density === 'calm') return;
    var rect = anchor.getBoundingClientRect();
    var centerX = rect.left + rect.width / 2;
    var centerY = rect.top + rect.height / 2;
    var pieceCount = density === 'lite' ? 10 : 18;
    var frag = document.createDocumentFragment();
    for (var i = 0; i < pieceCount; i++) {
        var piece = acquireTransientEffectNode_('miniConfettiPiece', 'div', 'confetti-piece confetti-piece--mini');
        var angle = (Math.PI * 2 * i / pieceCount) + ((Math.random() - 0.5) * 0.35);
        var distance = 40 + Math.random() * 46;
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.setProperty('--ctx', centerX + 'px');
        piece.style.setProperty('--cty', centerY + 'px');
        piece.style.setProperty('--cdx', Math.cos(angle) * distance + 'px');
        piece.style.setProperty('--cdy', Math.sin(angle) * distance + (18 + Math.random() * 28) + 'px');
        piece.style.setProperty('--cfd', (1.05 + Math.random() * 0.35) + 's');
        piece.style.setProperty('--cfr', ((Math.random() > 0.5 ? 1 : -1) * (240 + Math.random() * 420)) + 'deg');
        piece.style.setProperty('--cw', (5 + Math.random() * 5) + 'px');
        piece.style.setProperty('--ch', (8 + Math.random() * 6) + 'px');
        piece.style.animationDelay = (Math.random() * 0.12) + 's';
        frag.appendChild(piece);
        cleanupEffectNode_(piece, 1800);
    }
    document.body.appendChild(frag);
}

function launchSparkles(x, y) {
    var density = getEffectDensityTier_();
    if (density === 'calm') return;
    if (!canRunTransientEffects_()) return;
    var sparkleCount = density === 'lite' ? 5 : 8;
    var container = acquireSparkleBurst_(sparkleCount);
    container.style.left = x + 'px';
    container.style.top = y + 'px';
    var sparkColors = (typeof getActiveThemeSparkleColors_ === 'function' ? getActiveThemeSparkleColors_() : null) || ['#fbbf24','#f59e0b','#34d399','#60a5fa','#f472b6'];
    for (var i = 0; i < sparkleCount; i++) {
        var dot = container.childNodes[i];
        var angle = (Math.PI * 2 / sparkleCount) * i;
        var dist = 25 + Math.random() * 25;
        dot.style.setProperty('--sdx', Math.cos(angle) * dist + 'px');
        dot.style.setProperty('--sdy', Math.sin(angle) * dist + 'px');
        dot.style.background = sparkColors[Math.floor(Math.random() * sparkColors.length)];
        dot.hidden = false;
    }
    document.body.appendChild(container);
    cleanupEffectNode_(container, 800);
}

function popScoreElement(id) {
    var el = document.getElementById(id);
    if (!el) return;
    if (typeof restartAnimationClass_ === 'function') restartAnimationClass_(el, 'score-pop');
    else {
        el.classList.remove('score-pop');
        void el.offsetWidth;
        el.classList.add('score-pop');
    }
}
</script>
