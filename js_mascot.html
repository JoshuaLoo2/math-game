function getRandomMsg(type) {
    var msgs = mascotMessages[type] || mascotMessages.idle;
    return msgs[Math.floor(Math.random() * msgs.length)];
}

function updateMascotVisibility(sectionId) {
    var wrap = document.getElementById('teacher-mascot');
    if (!wrap) return;
    if (mascotExitTimer) {
        clearTimeout(mascotExitTimer);
        mascotExitTimer = null;
    }
    if (notesSections.indexOf(sectionId) !== -1) {
        wrap.classList.remove('mascot-exiting');
        wrap.classList.remove('mascot-hidden');
        if (sectionId === 'notes-grade-select' || sectionId === 'notes-topic-list') {
            setMascotState('enterNotes');
        } else if (sectionId === 'notes-reader') {
            setMascotState('reading');
        } else if (sectionId === 'notes-quiz') {
            setMascotState('thinking');
        } else {
            setMascotState('idle');
        }
    } else {
        if (wrap.classList.contains('mascot-hidden')) return;
        wrap.classList.add('mascot-exiting');
        mascotExitTimer = setTimeout(function() {
            wrap.classList.add('mascot-hidden');
            wrap.classList.remove('mascot-exiting');
            mascotExitTimer = null;
        }, 420);
    }
}

function setMascotState(state, customMsg) {
    var charEl = document.getElementById('mascot-char');
    var bubbleEl = document.getElementById('mascot-bubble');
    if (!charEl || !bubbleEl) return;

    charEl.className = 'mascot-char';
    void charEl.offsetWidth;

    switch(state) {
        case 'idle': charEl.classList.add('mascot-idle'); break;
        case 'celebrate': charEl.classList.add('mascot-celebrate'); break;
        case 'wrong': charEl.classList.add('mascot-wrong'); break;
        case 'thinking': charEl.classList.add('mascot-thinking'); break;
        case 'reading': charEl.classList.add('mascot-idle'); break;
        case 'enterNotes': charEl.classList.add('mascot-celebrate'); break;
    }
    applyAvatarVisualToElement_(charEl, getCurrentAvatarConfig_(), 'avatar-visual--mascot', '');

    var msg = customMsg || getRandomMsg(state);
    bubbleEl.innerText = msg;
    bubbleEl.classList.add('show');

    if (mascotTimer) clearTimeout(mascotTimer);
    mascotTimer = setTimeout(function() {
        bubbleEl.classList.remove('show');
        if (state === 'celebrate' || state === 'wrong') {
            setTimeout(function() { setMascotState('idle'); }, 400);
        }
    }, state === 'idle' ? 4000 : 3000);
}
